<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>露營行事曆</title>

<!-- FullCalendar -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<!-- Firebase (compat 版本，適合直接用 script 標籤、不需要打包工具) -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

<style>
  :root {
    --brand: #2f6f4f;
    --bg: #f6f5f1;
    --card: #ffffff;
    --border: #e2e0d8;
    --text: #2a2a2a;
    --muted: #7a7a72;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ---------- 登入畫面 ---------- */
  #authScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .authCard {
    background: var(--card);
    border-radius: 16px;
    padding: 32px 24px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  .authCard h1 {
    font-size: 20px;
    text-align: center;
    margin-bottom: 4px;
  }
  .authCard p.sub {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin-top: 0;
    margin-bottom: 20px;
  }
  .authCard input {
    width: 100%;
    padding: 12px 14px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
  }
  .authCard button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--brand);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    margin-top: 6px;
    cursor: pointer;
  }
  .authCard button.secondary {
    background: transparent;
    color: var(--brand);
    border: 1px solid var(--brand);
  }
  .authCard .errMsg {
    color: #c0392b;
    font-size: 13px;
    min-height: 18px;
    margin-top: 6px;
    text-align: center;
  }

  /* ---------- 主畫面 ---------- */
  #appScreen { display: none; }
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  header h1 {
    font-size: 16px;
    margin: 0;
    white-space: nowrap;
  }
  #userBadge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .dot {
    width: 12px; height: 12px; border-radius: 50%;
    display: inline-block;
    border: 1px solid rgba(0,0,0,0.15);
  }
  #colorPicker {
    width: 26px; height: 26px;
    border: none; padding: 0; border-radius: 50%; cursor: pointer;
  }
  #logoutBtn {
    background: none;
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
  }

  #legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 10px 14px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .legendItem { display: flex; align-items: center; gap: 5px; }

  #importBar { padding: 10px 14px 0; }
  #importBar button {
    background: none; border: 1px solid var(--border); padding: 6px 10px;
    border-radius: 8px; font-size: 12px; cursor: pointer; color: var(--text);
  }

  #calendarWrap { padding: 10px; max-width: 900px; margin: 0 auto; }
  #addBtn {
    position: fixed;
    right: 18px;
    bottom: 18px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--brand);
    color: #fff;
    font-size: 28px;
    border: none;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    cursor: pointer;
    z-index: 60;
    line-height: 56px;
    padding: 0;
  }

  /* ---------- Modal ---------- */
  .modalOverlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modalOverlay.show { display: flex; }
  .modalCard {
    background: #fff;
    width: 100%;
    max-width: 480px;
    border-radius: 16px 16px 0 0;
    padding: 20px;
    max-height: 90vh;
    overflow-y: auto;
  }
  @media (min-width: 600px) {
    .modalOverlay { align-items: center; }
    .modalCard { border-radius: 16px; }
  }
  .modalCard h2 { margin-top: 0; font-size: 17px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .field input, .field textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 14px; font-family: inherit;
  }
  .field.row { display: flex; gap: 10px; }
  .field.row > div { flex: 1; }
  .modalActions { display: flex; gap: 10px; margin-top: 16px; }
  .modalActions button {
    flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 14px; cursor: pointer;
  }
  .btnPrimary { background: var(--brand); color: #fff; font-weight: 600; }
  .btnGhost { background: #f1f0eb; color: var(--text); }
  .btnDanger { background: #fceceb; color: #c0392b; }

  .mapLink { display: none; font-size: 12px; color: var(--brand); text-decoration: none; margin-top: 4px; }
  .mapLink.show { display: inline-block; }

  .checkList { max-height: 150px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; }
  .checkRow { display: flex; align-items: center; gap: 6px; font-size: 13px; padding: 4px 0; }
  .checkRow input[type="checkbox"] { width: auto; margin: 0; }
  .checkRow .paidTag { margin-left: auto; font-size: 12px; color: var(--muted); }
  .checkRow .paidTag.isPaid { color: var(--brand); font-weight: 600; }

  .shareNote { font-weight: normal; color: var(--muted); }

  .exportRow { display: flex; gap: 10px; margin-bottom: 14px; }
  .exportRow button {
    flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
    background: #f1f0eb; color: var(--text); font-size: 13px; cursor: pointer;
  }

  #rangeCalendar { border: 1px solid var(--border); border-radius: 8px; padding: 8px; }
  .rcHeader { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
  .rcHeader button {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    width: 28px; height: 28px; cursor: pointer; font-size: 14px;
  }
  .rcHeader select {
    border: 1px solid var(--border); border-radius: 6px; padding: 3px 4px;
    font-size: 13px; font-family: inherit; background: #fff; color: var(--text);
  }
  .rcGrid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; font-size: 12px; }
  .rcDow { color: var(--muted); padding: 4px 0; font-weight: 600; }
  .rcDay { padding: 6px 0; border-radius: 6px; cursor: pointer; }
  .rcDay:hover { background: #f1f0eb; }
  .rcDay.rcInRange { background: #dcebe3; }
  .rcDay.rcStart, .rcDay.rcEnd { background: var(--brand); color: #fff; font-weight: 600; }
  .rcReadonly .rcDay { cursor: default; }
  .rcReadonly .rcDay:hover { background: none; }

  .timeSelectRow select {
    border: 1px solid var(--border); border-radius: 6px; padding: 6px 4px;
    font-size: 13px; font-family: inherit; background: #fff; color: var(--text);
  }

  #calendarNav { padding: 10px 14px 0; display: flex; align-items: center; gap: 6px; font-size: 13px; }
  #calendarNav select {
    border: 1px solid var(--border); border-radius: 6px; padding: 5px 6px;
    font-size: 13px; font-family: inherit; background: #fff; color: var(--text);
  }

  .fc { font-size: 13px; }
  .fc-toolbar-title { font-size: 16px !important; }

  @media (max-width: 480px) {
    header h1 { font-size: 14px; }
    #calendarWrap { padding: 4px; }
  }
</style>
</head>
<body>

<!-- ===== 登入 / 註冊畫面 ===== -->
<div id="authScreen">
  <div class="authCard">
    <h1>🏕️ 露營行事曆</h1>
    <p class="sub">登入後即可新增與查看大家的露營行程</p>
    <input id="emailInput" type="email" placeholder="Email" autocomplete="username" />
    <input id="passwordInput" type="password" placeholder="密碼（至少 6 碼）" autocomplete="current-password" />
    <input id="nameInput" type="text" placeholder="顯示名稱（第一次註冊時填寫）" />
    <button id="loginBtn">登入</button>
    <button id="signupBtn" class="secondary">第一次使用？註冊新帳號</button>
    <div class="errMsg" id="authErr"></div>
  </div>
</div>

<!-- ===== 主畫面 ===== -->
<div id="appScreen">
  <header>
    <h1>🏕️ 露營行事曆</h1>
    <div id="userBadge">
      <input type="color" id="colorPicker" title="選擇你的顏色" />
      <span id="userNameLabel"></span>
      <button id="logoutBtn">登出</button>
    </div>
  </header>

  <div id="legend"></div>

  <div id="importBar">
    <button id="importBtn" type="button">📥 從 Apple / Google 日曆匯入 (.ics)</button>
    <input type="file" id="icsFileInput" accept=".ics,text/calendar" style="display:none;" />
  </div>

  <div id="calendarNav">
    <select id="calYearSelect"></select> 年
    <select id="calMonthSelect"></select> 月
  </div>

  <div id="calendarWrap">
    <div id="calendar"></div>
  </div>

  <button id="addBtn" title="新增露營行程">＋</button>
</div>

<!-- ===== 從 .ics 匯入行程 Modal ===== -->
<div class="modalOverlay" id="importModal">
  <div class="modalCard">
    <h2>選擇要匯入的行程</h2>
    <p class="shareNote" style="margin-bottom:10px;">從檔案讀到 <span id="importCount">0</span> 筆，勾選想加入露營行事曆的項目（沒打勾的不會匯入）</p>

    <div class="field">
      <label>只顯示某個日期範圍內的行程（先點開始日期，再點結束日期）</label>
      <div id="rangeSummary" class="shareNote" style="margin-bottom:6px;"></div>
      <div id="rangeCalendar"></div>
      <button type="button" id="importFilterClearBtn" class="btnGhost" style="width:100%; margin-top:8px;">清除範圍（顯示全部）</button>
    </div>

    <button type="button" id="importSelectAllBtn" class="btnGhost" style="width:100%; margin-bottom:10px;">全選</button>

    <div class="checkList" id="importList" style="max-height:320px;"></div>
    <div class="modalActions">
      <button class="btnGhost" id="importCancelBtn">取消</button>
      <button class="btnPrimary" id="importConfirmBtn">匯入所選</button>
    </div>
  </div>
</div>

<!-- ===== 新增 / 編輯行程 Modal ===== -->
<div class="modalOverlay" id="tripModal">
  <div class="modalCard">
    <h2 id="modalTitle">新增露營行程</h2>
    <input type="hidden" id="tripId" />

    <div class="exportRow" id="exportRow" style="display:none;">
      <button type="button" id="googleCalBtn">📅 加到 Google 日曆</button>
      <button type="button" id="icsBtn">⬇️ 下載 .ics（Apple 日曆等）</button>
    </div>

    <div class="field">
      <label>行程名稱</label>
      <input id="tripTitle" type="text" placeholder="例如：拉拉山露營" />
    </div>
    <div class="field">
      <label>露營日期（先點開始日期，再點結束日期）</label>
      <div id="tripRangeSummary" class="shareNote" style="margin-bottom:6px;"></div>
      <div id="tripRangeCalendar"></div>
    </div>
    <div class="field row">
      <div>
        <label>報到時間（選填）</label>
        <div id="tripStartTimeSelects" class="timeSelectRow"></div>
      </div>
      <div>
        <label>離營時間（選填）</label>
        <div id="tripEndTimeSelects" class="timeSelectRow"></div>
      </div>
    </div>
    <div class="field">
      <label>地點</label>
      <input id="tripLocation" type="text" placeholder="地標名稱、地址，或貼上 Google 地圖連結" />
      <a id="locationMapLink" class="mapLink" href="#" target="_blank" rel="noopener">📍 在 Google 地圖開啟</a>
    </div>
    <div class="field row">
      <div>
        <label>營位</label>
        <input id="tripSite" type="text" placeholder="例如：A5" />
      </div>
      <div>
        <label>營位費用（總額）</label>
        <input id="tripFee" type="number" min="0" step="1" placeholder="0" />
      </div>
    </div>
    <div class="field">
      <label>備註（選填）</label>
      <textarea id="tripNotes" rows="3" placeholder="選填"></textarea>
    </div>
    <div class="field">
      <label>一起分攤的人（費用會平均分攤）</label>
      <div class="checkList" id="participantsList"></div>
    </div>
    <div class="field" id="paymentsField" style="display:none;">
      <label>付款狀態 <span class="shareNote">（每人應付 $<span id="perPersonShare">0</span>，只能勾選自己的付款狀態）</span></label>
      <div class="checkList" id="paymentsList"></div>
    </div>
    <div class="modalActions">
      <button class="btnGhost" id="cancelBtn">取消</button>
      <button class="btnDanger" id="deleteBtn" style="display:none;">刪除</button>
      <button class="btnPrimary" id="saveBtn">儲存</button>
    </div>
  </div>
</div>

<script>
/* =========================================================
   1) 請把下面的 firebaseConfig 換成你自己 Firebase 專案的設定
      （在 Firebase Console > 專案設定 > 一般 > 你的應用程式 取得）
   ========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyCzoXnr1rASYmRWoW6jU-0mhjppKPiu82w",
  authDomain: "camping-calendar-74962.firebaseapp.com",
  projectId: "camping-calendar-74962",
  storageBucket: "camping-calendar-74962.firebasestorage.app",
  messagingSenderId: "863850320316",
  appId: "1:863850320316:web:06981661efce0c654a1bb9"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const DEFAULT_COLORS = ["#2f6f4f", "#c0392b", "#2980b9", "#8e44ad", "#e67e22", "#16a085", "#d35400", "#34495e"];

let currentUser = null;
let currentProfile = null;
let calendar = null;
let unsubTrips = null;
let unsubUsers = null;
let unsubPayments = null;
let allUsers = {};
let currentTripId = null;
let currentTripProps = null;

/* ---------- DOM refs ---------- */
const authScreen = document.getElementById("authScreen");
const appScreen = document.getElementById("appScreen");
const authErr = document.getElementById("authErr");

/* ---------- 登入 / 註冊 ---------- */
document.getElementById("loginBtn").onclick = async () => {
  authErr.textContent = "";
  const email = document.getElementById("emailInput").value.trim();
  const pw = document.getElementById("passwordInput").value;
  if (!email || !pw) { authErr.textContent = "請輸入 Email 與密碼"; return; }
  try {
    await auth.signInWithEmailAndPassword(email, pw);
  } catch (e) {
    authErr.textContent = translateAuthError(e);
  }
};

document.getElementById("signupBtn").onclick = async () => {
  authErr.textContent = "";
  const email = document.getElementById("emailInput").value.trim();
  const pw = document.getElementById("passwordInput").value;
  const name = document.getElementById("nameInput").value.trim() || email.split("@")[0];
  if (!email || !pw) { authErr.textContent = "請輸入 Email 與密碼"; return; }
  if (pw.length < 6) { authErr.textContent = "密碼至少需要 6 碼"; return; }
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pw);
    const color = DEFAULT_COLORS[Math.floor(Math.random() * DEFAULT_COLORS.length)];
    await db.collection("users").doc(cred.user.uid).set({
      displayName: name,
      color: color,
      email: email
    });
  } catch (e) {
    authErr.textContent = translateAuthError(e);
  }
};

document.getElementById("logoutBtn").onclick = () => auth.signOut();

function translateAuthError(e) {
  const code = e.code || "";
  if (code.includes("email-already-in-use")) return "這個 Email 已經註冊過了，請直接登入";
  if (code.includes("wrong-password") || code.includes("invalid-credential")) return "密碼錯誤";
  if (code.includes("user-not-found")) return "找不到這個帳號，請先註冊";
  if (code.includes("invalid-email")) return "Email 格式不正確";
  if (code.includes("weak-password")) return "密碼太簡單，至少需要 6 碼";
  return "發生錯誤：" + e.message;
}

/* ---------- 登入狀態監聽 ---------- */
auth.onAuthStateChanged(async (user) => {
  if (unsubTrips) { unsubTrips(); unsubTrips = null; }
  if (unsubUsers) { unsubUsers(); unsubUsers = null; }

  if (!user) {
    currentUser = null;
    authScreen.style.display = "flex";
    appScreen.style.display = "none";
    return;
  }
  currentUser = user;

  let profileSnap = await db.collection("users").doc(user.uid).get();
  if (!profileSnap.exists) {
    const color = DEFAULT_COLORS[Math.floor(Math.random() * DEFAULT_COLORS.length)];
    await db.collection("users").doc(user.uid).set({
      displayName: user.email.split("@")[0],
      color: color,
      email: user.email
    });
    profileSnap = await db.collection("users").doc(user.uid).get();
  }
  currentProfile = profileSnap.data();

  authScreen.style.display = "none";
  appScreen.style.display = "block";

  document.getElementById("userNameLabel").textContent = currentProfile.displayName;
  document.getElementById("colorPicker").value = currentProfile.color;

  initCalendar();
  listenUsers();
  listenTrips();
});

/* ---------- 個人顏色 ---------- */
document.getElementById("colorPicker").onchange = async (e) => {
  const color = e.target.value;
  await db.collection("users").doc(currentUser.uid).update({ color });
  currentProfile.color = color;
  // 更新自己所有行程的顏色
  const mine = await db.collection("trips").where("ownerUid", "==", currentUser.uid).get();
  const batch = db.batch();
  mine.forEach(doc => batch.update(doc.ref, { color }));
  await batch.commit();
};

/* ---------- 使用者列表（圖例） ---------- */
function listenUsers() {
  unsubUsers = db.collection("users").onSnapshot((snap) => {
    allUsers = {};
    snap.forEach(doc => { allUsers[doc.id] = doc.data(); });
    renderLegend();
  });
}

function renderLegend() {
  const legend = document.getElementById("legend");
  legend.innerHTML = "";
  Object.values(allUsers).forEach(u => {
    const item = document.createElement("div");
    item.className = "legendItem";
    item.innerHTML = `<span class="dot" style="background:${u.color}"></span><span>${escapeHtml(u.displayName)}</span>`;
    legend.appendChild(item);
  });
}

/* ---------- 行事曆 ---------- */
function initCalendar() {
  const el = document.getElementById("calendar");
  calendar = new FullCalendar.Calendar(el, {
    initialView: "dayGridMonth",
    height: "auto",
    headerToolbar: {
      left: "prev,next today",
      center: "title",
      right: "dayGridMonth,listMonth"
    },
    locale: "zh-tw",
    firstDay: 1,
    events: [],
    datesSet: () => { syncCalendarNavSelects(calendar.getDate()); },
    eventClick: (info) => {
      openModal(info.event);
    }
  });
  calendar.render();
  populateCalendarNavSelects();
  syncCalendarNavSelects(calendar.getDate());
}

function populateCalendarNavSelects() {
  const nowYear = new Date().getFullYear();
  const yearSelect = document.getElementById("calYearSelect");
  let yearOptions = "";
  for (let y = nowYear - 2; y <= nowYear + 5; y++) yearOptions += `<option value="${y}">${y}</option>`;
  yearSelect.innerHTML = yearOptions;

  const monthSelect = document.getElementById("calMonthSelect");
  let monthOptions = "";
  for (let m = 1; m <= 12; m++) monthOptions += `<option value="${m}">${m}</option>`;
  monthSelect.innerHTML = monthOptions;

  yearSelect.onchange = jumpCalendarToSelectedMonth;
  monthSelect.onchange = jumpCalendarToSelectedMonth;
}

function jumpCalendarToSelectedMonth() {
  const y = Number(document.getElementById("calYearSelect").value);
  const m = Number(document.getElementById("calMonthSelect").value);
  calendar.gotoDate(new Date(y, m - 1, 1));
}

function syncCalendarNavSelects(date) {
  const yearSelect = document.getElementById("calYearSelect");
  const y = date.getFullYear();
  if (!Array.from(yearSelect.options).some(o => Number(o.value) === y)) {
    const opt = document.createElement("option");
    opt.value = y;
    opt.textContent = y;
    yearSelect.appendChild(opt);
    Array.from(yearSelect.options)
      .sort((a, b) => Number(a.value) - Number(b.value))
      .forEach(o => yearSelect.appendChild(o));
  }
  yearSelect.value = y;
  document.getElementById("calMonthSelect").value = date.getMonth() + 1;
}

function listenTrips() {
  unsubTrips = db.collection("trips").onSnapshot((snap) => {
    const events = [];
    snap.forEach(doc => {
      const d = doc.data();
      events.push({
        id: doc.id,
        title: (d.ownerName ? d.ownerName + "・" : "") + d.title,
        start: d.start,
        end: addOneDay(d.end),
        allDay: true,
        backgroundColor: d.color,
        borderColor: d.color,
        extendedProps: {
          rawTitle: d.title,
          notes: d.notes || "",
          ownerUid: d.ownerUid,
          ownerName: d.ownerName || "",
          start: d.start,
          end: d.end,
          startTime: d.startTime || "",
          endTime: d.endTime || "",
          location: d.location || "",
          siteNumber: d.siteNumber || "",
          siteFee: d.siteFee || 0,
          participantUids: d.participantUids || [d.ownerUid]
        }
      });
    });
    calendar.removeAllEvents();
    calendar.addEventSource(events);
  });
}

function addOneDay(dateStr) {
  // FullCalendar 的 end 是 exclusive，所以要 +1 天才會把結束日整天顯示出來
  // 用 UTC 建構/運算日期，避免在 UTC+8 等時區用本地時間算日期時，toISOString() 轉回 UTC 又倒退一天
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  dt.setUTCDate(dt.getUTCDate() + 1);
  return dt.toISOString().slice(0, 10);
}

function buildMapsUrl(loc) {
  if (!loc) return null;
  const trimmed = loc.trim();
  if (!trimmed) return null;
  if (/^https?:\/\//i.test(trimmed)) return trimmed;
  return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(trimmed);
}

function listenPayments(tripId, participantUids, fee) {
  const perPerson = participantUids.length ? Math.round((fee || 0) / participantUids.length) : 0;

    snap.forEach(doc => { paidMap[doc.id] = !!doc.data().paid; });

  });

  const list = document.getElementById("paymentsList");
  list.innerHTML = "";

    row.className = "checkRow";

/* ---------- 匯出到 Google / Apple 日曆 ---------- */
function buildEventDescription(props) {
  const lines = [];
  if (props.siteNumber) lines.push("營位：" + props.siteNumber);
  if (props.siteFee) lines.push("營位費用：$" + props.siteFee);
  if (props.startTime) lines.push("報到時間：" + props.startTime);
  if (props.endTime) lines.push("離營時間：" + props.endTime);
  if (props.notes) lines.push(props.notes);
  return lines.join("\n");
}

/* ---------- 日期範圍選擇小月曆（共用元件） ---------- */
function pad2(n) { return String(n).padStart(2, "0"); }
function ymd(y, m, d) { return `${y}-${pad2(m + 1)}-${pad2(d)}`; }

function createRangePicker({ containerEl, summaryEl, getYearBounds, formatSummary, onChange }) {
  let start = null;
  let end = null;
  let viewYear = new Date().getFullYear();
  let viewMonth = new Date().getMonth();
  let interactive = true;

  function render() {
    let { minYear, maxYear } = getYearBounds();
    if (viewYear < minYear) minYear = viewYear;
    if (viewYear > maxYear) maxYear = viewYear;

    const firstWeekday = (new Date(viewYear, viewMonth, 1).getDay() + 6) % 7; // 週一=0
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

    let yearOptions = "";
    for (let y = minYear; y <= maxYear; y++) {
      yearOptions += `<option value="${y}" ${y === viewYear ? "selected" : ""}>${y}</option>`;
    }
    let monthOptions = "";
    for (let m = 1; m <= 12; m++) {
      monthOptions += `<option value="${m}" ${m === viewMonth + 1 ? "selected" : ""}>${m}</option>`;
    }

    let html = `<div class="rcHeader">
      <button type="button" class="rcPrev">‹</button>
      <span>
        <select class="rcYearSelect">${yearOptions}</select> 年
        <select class="rcMonthSelect">${monthOptions}</select> 月
      </span>
      <button type="button" class="rcNext">›</button>
    </div><div class="rcGrid">`;
    ["一", "二", "三", "四", "五", "六", "日"].forEach(d => { html += `<div class="rcDow">${d}</div>`; });
    for (let i = 0; i < firstWeekday; i++) html += `<div></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = ymd(viewYear, viewMonth, d);
      let cls = "rcDay";
      if (start && end && dateStr > start && dateStr < end) cls += " rcInRange";
      if (dateStr === start) cls += " rcStart";
      if (dateStr === end) cls += " rcEnd";
      html += `<div class="${cls}" data-date="${dateStr}">${d}</div>`;
    }
    html += `</div>`;
    containerEl.innerHTML = html;
    containerEl.classList.toggle("rcReadonly", !interactive);

    containerEl.querySelector(".rcPrev").onclick = () => shiftMonth(-1);
    containerEl.querySelector(".rcNext").onclick = () => shiftMonth(1);
    containerEl.querySelector(".rcYearSelect").onchange = (e) => { viewYear = Number(e.target.value); render(); };
    containerEl.querySelector(".rcMonthSelect").onchange = (e) => { viewMonth = Number(e.target.value) - 1; render(); };
    if (interactive) {
      containerEl.querySelectorAll(".rcDay").forEach(el => {
        el.onclick = () => onDayClick(el.dataset.date);
      });
    }
  }

  function shiftMonth(delta) {
    viewMonth += delta;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    render();
  }

  function onDayClick(dateStr) {
    if (!start || end) {
      start = dateStr;
      end = null;
    } else if (dateStr < start) {
      end = start;
      start = dateStr;
    } else {
      end = dateStr;
    }
    updateSummary();
    render();
    if (onChange) onChange(start, end);
  }

  function updateSummary() {
    summaryEl.textContent = formatSummary(start, end);
  }

  function reset(anchorDateStr) {
    start = null;
    end = null;
    const now = new Date();
    if (anchorDateStr) {
      const [y, m] = anchorDateStr.split("-").map(Number);
      viewYear = y;
      viewMonth = m - 1;
    } else {
      viewYear = now.getFullYear();
      viewMonth = now.getMonth();
    }
    updateSummary();
    render();
  }

  function setRange(s, e) {
    start = s || null;
    end = start ? (e || s) : null;
    if (start) {
      const [y, m] = start.split("-").map(Number);
      viewYear = y;
      viewMonth = m - 1;
    }
    updateSummary();
    render();
  }

  function setInteractive(flag) {
    interactive = flag;
    render();
  }

  function getRange() { return { start, end }; }

  return { reset, setRange, getRange, setInteractive };
}

/* ---------- 時間下拉選單 ---------- */
const TIME_MINUTE_STEPS = ["00", "15", "30", "45"];

function timeSelectsHtml(hourId, minuteId, hhmm) {
  const [h, m] = (hhmm || "").split(":");
  let hourOptions = `<option value="">--</option>`;
  for (let i = 0; i < 24; i++) {
    const hh = pad2(i);
    hourOptions += `<option value="${hh}" ${hh === h ? "selected" : ""}>${hh}</option>`;
  }
  const minuteSet = new Set(TIME_MINUTE_STEPS);
  if (m) minuteSet.add(m);
  const minuteList = Array.from(minuteSet).sort();
  const minuteOptions = minuteList.map(mm => `<option value="${mm}" ${mm === m ? "selected" : ""}>${mm}</option>`).join("");
  return `<select id="${hourId}">${hourOptions}</select> 時
    <select id="${minuteId}">${minuteOptions}</select> 分`;
}

function getTimeValue(hourId, minuteId) {
  const h = document.getElementById(hourId).value;
  if (!h) return "";
  const m = document.getElementById(minuteId).value || "00";
  return h + ":" + m;
}

/* ---------- 從 .ics 匯入行程 ---------- */
const importModal = document.getElementById("importModal");
let parsedIcsEvents = [];
let selectedIdx = new Set();

function subtractOneDay(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  dt.setUTCDate(dt.getUTCDate() - 1);
  return dt.toISOString().slice(0, 10);
}

function unescapeIcsText(s) {
  return (s || "").replace(/\\n/gi, " ").replace(/\\,/g, ",").replace(/\\;/g, ";").replace(/\\\\/g, "\\");
}

function parseIcsDateProp(value, isDateOnly) {
  const v = value.replace("Z", "");
  const y = v.slice(0, 4), m = v.slice(4, 6), d = v.slice(6, 8);
  const date = `${y}-${m}-${d}`;
  const time = (!isDateOnly && v.length >= 13) ? v.slice(9, 11) + ":" + v.slice(11, 13) : "";
  return { date, time };
}

function parseIcs(text) {
  const rawLines = text.split(/\r\n|\n|\r/);
  const lines = [];
  rawLines.forEach(line => {
    if (/^[ \t]/.test(line) && lines.length) {
      lines[lines.length - 1] += line.slice(1);
    } else {
      lines.push(line);
    }
  });

  const events = [];
  let cur = null;
  lines.forEach(line => {
    if (line === "BEGIN:VEVENT") { cur = {}; return; }
    if (line === "END:VEVENT") { if (cur && cur.title && cur.start) events.push(cur); cur = null; return; }
    if (!cur) return;
    const colonIdx = line.indexOf(":");
    if (colonIdx === -1) return;
    const left = line.slice(0, colonIdx);
    const value = line.slice(colonIdx + 1);
    const [propName, ...params] = left.split(";");
    const isDateOnly = params.some(p => p.toUpperCase() === "VALUE=DATE");
    if (propName === "SUMMARY") cur.title = unescapeIcsText(value);
    else if (propName === "LOCATION") cur.location = unescapeIcsText(value);
    else if (propName === "DESCRIPTION") cur.notes = unescapeIcsText(value);
    else if (propName === "DTSTART") {
      const { date, time } = parseIcsDateProp(value, isDateOnly);
      cur.start = date;
      cur.startTime = time;
      cur.allDay = isDateOnly;
    } else if (propName === "DTEND") {
      const { date, time } = parseIcsDateProp(value, isDateOnly);
      cur.end = isDateOnly ? subtractOneDay(date) : date;
      cur.endTime = time;
    }
  });
  events.forEach(ev => { if (!ev.end) ev.end = ev.start; });
  return events;
}

function renderImportList(events) {
  document.getElementById("importCount").textContent = events.length;
  const list = document.getElementById("importList");
  list.innerHTML = "";
  events.forEach(({ ev, idx }) => {
    const dateLabel = ev.start === ev.end ? ev.start : (ev.start + " ~ " + ev.end);
    const row = document.createElement("label");
    row.className = "checkRow";
    row.innerHTML = `<input type="checkbox" data-idx="${idx}" ${selectedIdx.has(idx) ? "checked" : ""} />
      <span>${escapeHtml(ev.title)}（${dateLabel}${ev.location ? "・" + escapeHtml(ev.location) : ""}）</span>`;
    row.querySelector("input").onchange = (e) => {
      if (e.target.checked) selectedIdx.add(idx);
      else selectedIdx.delete(idx);
      updateSelectAllLabel(events);
    };
    list.appendChild(row);
  });
  updateSelectAllLabel(events);
}

function currentFilteredEvents() {
  const { start, end } = importRangePicker.getRange();
  return parsedIcsEvents
    .map((ev, idx) => ({ ev, idx }))
    .filter(({ ev }) => (!start || ev.start >= start) && (!end || ev.start <= end));
}

function updateSelectAllLabel(visibleEvents) {
  const allSelected = visibleEvents.length > 0 && visibleEvents.every(({ idx }) => selectedIdx.has(idx));
  document.getElementById("importSelectAllBtn").textContent = allSelected ? "取消全選" : "全選";
}

function rangeCalendarYearBounds() {
  const years = parsedIcsEvents.map(ev => Number(ev.start.slice(0, 4)));
  const nowYear = new Date().getFullYear();
  const known = years.length ? years : [nowYear];
  return { minYear: Math.min(nowYear, ...known) - 1, maxYear: Math.max(nowYear, ...known) + 1 };
}

const importRangePicker = createRangePicker({
  containerEl: document.getElementById("rangeCalendar"),
  summaryEl: document.getElementById("rangeSummary"),
  getYearBounds: rangeCalendarYearBounds,
  formatSummary: (s, e) => {
    if (!s) return "尚未設定範圍（目前顯示全部）";
    if (!e) return `已選開始日期 ${s}，請再點一次結束日期（點同一天代表只篩選這一天）`;
    return `篩選範圍：${s} ~ ${e}`;
  },
  onChange: () => renderImportList(currentFilteredEvents())
});

document.getElementById("importFilterClearBtn").onclick = () => {
  importRangePicker.setRange(null, null);
  renderImportList(currentFilteredEvents());
};

function openImportModal(events) {
  parsedIcsEvents = events;
  selectedIdx = new Set();
  importRangePicker.reset(events.length ? events[0].start : null);
  renderImportList(currentFilteredEvents());
  importModal.classList.add("show");
}

document.getElementById("importBtn").onclick = () => document.getElementById("icsFileInput").click();

document.getElementById("icsFileInput").onchange = (e) => {
  const file = e.target.files[0];
  e.target.value = "";
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const events = parseIcs(reader.result);
    if (!events.length) { alert("這個檔案裡沒有讀到可匯入的行程"); return; }
    openImportModal(events);
  };
  reader.onerror = () => alert("讀取檔案失敗");
  reader.readAsText(file);
};

document.getElementById("importSelectAllBtn").onclick = () => {
  const visible = currentFilteredEvents();
  const allSelected = visible.length > 0 && visible.every(({ idx }) => selectedIdx.has(idx));
  visible.forEach(({ idx }) => { if (allSelected) selectedIdx.delete(idx); else selectedIdx.add(idx); });
  renderImportList(visible);
};

document.getElementById("importCancelBtn").onclick = () => importModal.classList.remove("show");

document.getElementById("importConfirmBtn").onclick = async () => {
  if (!selectedIdx.size) { alert("請至少選一筆要匯入的行程"); return; }
  try {
    const batch = db.batch();
    selectedIdx.forEach(idx => {
      const ev = parsedIcsEvents[idx];
      const ref = db.collection("trips").doc();
      batch.set(ref, {
        title: ev.title,
        start: ev.start,
        end: ev.end,
        startTime: ev.startTime || "",
        endTime: ev.endTime || "",
        location: ev.location || "",
        siteNumber: "",
        siteFee: 0,
        notes: ev.notes || "",
        participantUids: [currentUser.uid],
        ownerUid: currentUser.uid,
        ownerName: currentProfile.displayName,
        color: currentProfile.color,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    });
    await batch.commit();
    importModal.classList.remove("show");
    alert(`已匯入 ${selectedIdx.size} 筆行程`);
  } catch (e) {
    alert("匯入失敗：" + e.message);
  }
};
</script>
</body>
</html>
